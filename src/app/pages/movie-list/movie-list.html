<!-- Filter section -->
<div class="filter-controls">
    <label>Filter by Genre:</label>
    <select (change)="onGenreChange($event)">
        <!-- Loop through genres -->
        @for (genre of genres; track genre) {
        <option [value]="genre">
            {{ genre }}
        </option>
        }
    </select>

    <!-- Sort button -->
    <button (click)="toggleSortByRating()">Sort by Rating</button>

    <!-- Search input -->
    <label for="search">Search by Title:</label>
    <input 
        id="search" 
        type="text" 
        placeholder="Type a movie title..." 
        [(ngModel)]="searchTerm" 
        (input)="applyFilter()">
</div>

<!-- Movie cards grid -->
<div class="movie-grid">
    <!-- Loop through filtered movies -->
    @for (movie of filteredMovies; track movie.id){
        <app-movie-card
            [movie]="movie"
            (statusChange)="onStatusChange($event)"
            (favoriteToggle)="onFavoriteToggle($event)"
            (delete)="onDelete($event)">
        </app-movie-card>
    }
</div>
