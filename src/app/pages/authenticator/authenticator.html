<div class="auth-container">

  <h2>{{ isLoginMode ? 'Login' : 'Sign Up' }}</h2>

  <form (ngSubmit)="submit()">

    <!-- Campo Name (apenas visível no sign-up) -->
    <div [hidden]="isLoginMode">
      <label for="name">Name</label>
      <input
        id="name"
        type="text"
        [(ngModel)]="name"
        name="name"
        placeholder="Enter your name"
      />
    </div>

    <!-- Email -->
    <div>
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Enter your email"
        required
      />
    </div>

    <!-- Password -->
    <div>
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter your password"
        required
      />
    </div>

    <!-- Botão submit -->
    <button type="submit">
      {{ isLoginMode ? 'Login' : 'Create Account' }}
    </button>

  </form>

  <!-- Mensagem de erro ou sucesso -->
  <p [class.error]="message === 'Credenciais inválidas.' || message === 'Preencha todos os campos.'">
    {{ message }}
  </p>

  <!-- Botão para alternar entre login e sign-up -->
  <button (click)="toggleMode()">
    {{ isLoginMode ? 'Create an account' : 'Already have an account?' }}
  </button>

</div>
