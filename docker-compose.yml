services:

  # Serviço responsável pelo frontend Angular
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: moviemanager-app

    ports:
      - "${APP_PORT}:80"

    depends_on:
      - api

    environment:
      API_URL: ${API_URL}

  # Serviço responsável pela API mock
  api:
    image: node:20-alpine

    container_name: moviemanager-api

    working_dir: /api

    environment:
      JSON_SERVER_WATCH: ${JSON_SERVER_WATCH}

    command: >
      sh -c "npm install -g json-server &&
      json-server --host 0.0.0.0 --port 3000 db.json"

    ports:
      - "${API_PORT}:3000"

    volumes:
      - ./mock-api/db.json:/api/db.json

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://api:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

