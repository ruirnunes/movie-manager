services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moviemanager-app
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - api
    environment:
      API_URL: ${API_URL}

  api:
    image: node:20-alpine
    container_name: moviemanager-api
    working_dir: /api
    environment:
      JSON_SERVER_WATCH: ${JSON_SERVER_WATCH}
    command: >
      sh -c "npm install -g json-server &&
      json-server --host 0.0.0.0 --port 3000 /api/db.json --watch"
    ports:
      - "${API_PORT}:3000"
    volumes:
      - ./mock-api:/api:rw   # monta a pasta inteira com permissão de escrita
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://api:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

