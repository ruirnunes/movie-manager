<div class = 'kpi-container'>
    
    <app-kpi-card
        title = "Total Movies"
        [value] = 'totalMovies'>
    </app-kpi-card>

    <app-kpi-card
        title = "Watched"
        [value] = 'watchedMovies'>
    </app-kpi-card>

    <app-kpi-card
        title = "To Watch"
        [value] = 'toWatchMovies'>
    </app-kpi-card>

    <app-kpi-card
        title = "Skipped"
        [value] = 'skippedMovies'>
    </app-kpi-card>

    <app-kpi-card
        title = "Watching"
        [value] = 'watchingMovies'>
    </app-kpi-card>

    <app-kpi-card
        title = "Average Rating"
        [value] = 'averageRating'>
    </app-kpi-card>

</div>


<div class="top-favorites">
  <h2>Top 3 Favorite Movies</h2>
  <div class="movie-grid">
    @for (movie of topFavorites; track movie.id) {
      <app-movie-card
        [movie]="movie"
        (statusChange)="onStatusChange($event)"
        (favoriteToggle)="onFavoriteToggle($event)"
        (delete)="onDelete($event)">
      </app-movie-card>
    }
  </div>
</div>
