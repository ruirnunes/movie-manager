<div class="list-container">
  <!-- Page title -->
  <h2>WatchList</h2>

  <!-- Grid of movies to watch -->
  <div class="movie-grid">
    @for (movie of toWatchMovies; track movie.id){
        <app-movie-card
            [movie]="movie"
            (statusChange)="onStatusChange($event)"
            (favoriteToggle)="onFavoriteToggle($event)"
            (delete)="onDelete($event)">
        </app-movie-card>
    }
  </div>
</div>
