<div class="list-container">
  <h2>Watched Movies</h2>
  <div class="movie-grid">
    @for (movie of watchedMovies; track movie.id){
        <app-movie-card
            [movie]="movie"
            (statusChange)="onStatusChange($event)"
            (favoriteToggle)="onFavoriteToggle($event)"
            (delete)="onDelete($event)">
        </app-movie-card>
    }
  </div>
</div>
